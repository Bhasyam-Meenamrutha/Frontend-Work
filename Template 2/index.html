<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

<body>
    </head>

    <body>
        <form action="" method="">
            <div class="form-title">
                <h2>Create your Account</h2>
                <h3>Join us now!</h3>
            </div>
            <div class="form-field">
                <label for="name">Full Name</label>
                <div class="input-field">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>
            </div>
            <div class="form-field">
                <label for="email">Email</label>
                <div class="input-field">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
            </div>
            <div class="form-field">
                <label for="password">Password</label>
                <div class="input-field">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
            </div>
            <div class="form-field">
                <label for="confirm-password">Confirm Password</label>
                <div class="input-field">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="confirm-password" name="confirm-password"
                        placeholder="Confirm your password" required>
                </div>
            </div>
            <div class="form-radio">
                <label for="gender">Gender</label>

                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Male</label>

                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</label>

                <input type="radio" id="other" name="gender" value="other">
                <label for="other">Other</label>
            </div>
            <div class="form-field">
                <label for="dob">Date of Birth</label>
                <div class="input-field">
                    <i class="fa-solid fa-calendar"></i>
                    <input type="date" id="dob" name="dob" placeholder="Select your date of birth" required>
                </div>
            </div>
            <div class="form-field">
                <label for="country">Country</label>
                <div class="drop-down">
                    <i class="fa-solid fa-globe"></i>
                    <select id="country" name="country" required>
                        <option value="">Select your country</option>
                        <option value="usa">United States</option>
                        <option value="uk">United Kingdom</option>
                        <option value="canada">Canada</option>
                        <option value="australia">Australia</option>
                        <option value="india">India</option>
                    </select>
                </div>
            </div>
            <div class="form-checkbox">
                <input type="checkbox" id="terms" name="terms" required>
                <span for="terms">I agree to the <a href="#">Terms of service </a> and <a href="#">Privacy
                        Policy</a></span>

            </div>

            <div class="Form-btn">
                <button type="submit">Register now</button>
            </div>
            <div class="form-footer">
                <span>Already have an account? <a href="#">Login here</a></span>
            </div>


        </form>
    </body>

</html>
